{{ define "main" }}
<section class="hero-section reveal">
    <div class="hero-intro">
        <h2 class="hero-name">{{ .Site.Title }}</h2>
        <p class="hero-tagline">{{ .Site.Params.description }}</p>
        <div class="hero-ctas">
            <a href="/contact/" class="btn btn-primary">联系我</a>
            <a href="/about/" class="btn btn-secondary">了解更多</a>
        </div>
    </div>
</section>

<article class="landing-content">
    {{ .Content }}
</article>
{{ end }}
