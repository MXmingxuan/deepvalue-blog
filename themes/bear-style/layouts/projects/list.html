{{ define "main" }}
<h1>{{ .Title }}</h1>
<div class="projects-grid">
    {{ range .Pages.ByDate.Reverse }}
    <article class="project-card">
        <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
        <time>{{ .Date.Format "2006-01-02" }}</time>
        <p>{{ .Summary }}</p>
    </article>
    {{ else }}
    <p class="placeholder">项目内容更新中，敬请期待。</p>
    {{ end }}
</div>
{{ end }}
